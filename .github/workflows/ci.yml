# Runs the test suite on every push and pull request.
#
# The suite depends ONLY on the synthetic fixture in tests/fixtures/. The real
# UCI dataset is never downloaded here: no data/raw access and no kagglehub call.
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"  # matches runtime.txt (python-3.12.10)
          cache: pip
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r dev-requirements.txt

      # Coverage is reported but not gated, to keep the build robust while the
      # test suite targets the data pipeline and metrics on synthetic fixtures.
      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing
